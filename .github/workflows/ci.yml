name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build CLI
        run: |
          mkdir -p bin
          go build -o ./bin/argusgate ./cmd/argusgate
